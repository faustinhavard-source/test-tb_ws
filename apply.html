<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply - The Bridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1E1E1E;
            font-family: 'Courier New', monospace;
            color: #FFFFFF;
            min-height: 100vh;
        }

        /* Header - identique à index.html (version sombre) */
        #header {
            position: fixed;
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: auto;
        }

        #header > a {
            display: flex;
            align-items: flex-end;
        }

        #logo {
            height: 24px;
            filter: brightness(0) invert(1);
        }

        #apply-btn {
            font-family: 'Lora', serif;
            font-size: clamp(10px, 1vw, 13px);
            font-style: italic;
            font-weight: 400;
            color: #FFFFFF;
            background-color: transparent;
            border: 1px solid #FFFFFF;
            text-decoration: none;
            letter-spacing: 0.02em;
            padding: 8px 20px;
            border-radius: 50px;
            transition: all 0.2s ease;
        }

        #apply-btn:hover {
            background-color: #FFFFFF;
            color: #1E1E1E;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: clamp(15px, 3vw, 40px);
        }

        #nav-menu {
            display: flex;
            gap: clamp(12px, 2.5vw, 30px);
        }

        #nav-menu a {
            font-family: 'IBM Plex Mono', monospace;
            font-size: clamp(9px, 0.9vw, 12px);
            color: #FFFFFF;
            text-decoration: none;
            letter-spacing: 0.05em;
            transition: opacity 0.2s ease;
        }

        #nav-menu a:hover {
            opacity: 0.6;
        }

        /* Mobile menu hamburger */
        #menu-toggle {
            display: none;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
            width: 24px;
            height: 24px;
            cursor: pointer;
            z-index: 101;
        }

        #menu-toggle span {
            display: block;
            width: 100%;
            height: 1.5px;
            background-color: #FFFFFF;
            transition: all 0.3s ease;
        }

        #menu-toggle.open span:nth-child(1) {
            transform: rotate(45deg) translate(4px, 4px);
        }

        #menu-toggle.open span:nth-child(2) {
            opacity: 0;
        }

        #menu-toggle.open span:nth-child(3) {
            transform: rotate(-45deg) translate(4px, -4px);
        }

        /* Mobile overlay menu */
        #mobile-menu {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #1E1E1E;
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        #mobile-menu.open {
            display: flex;
        }

        #mobile-menu a {
            font-family: 'Lora', serif;
            font-size: 32px;
            font-style: italic;
            color: #FFFFFF;
            text-decoration: none;
            transition: opacity 0.2s ease;
        }

        #mobile-menu a:hover {
            opacity: 0.6;
        }

        @media (max-width: 600px) {
            #nav-menu {
                display: none;
            }

            #menu-toggle {
                display: flex;
            }
        }

        /* Content */
        #content {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 8%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Hero */
        .hero {
            text-align: center;
            padding: 100px 0 60px;
        }

        .hero h1 {
            font-family: 'Lora', serif;
            font-size: clamp(48px, 10vw, 80px);
            font-weight: 400;
            font-style: italic;
            color: #FFFFFF;
            letter-spacing: -0.03em;
            line-height: 0.9;
            margin-bottom: 20px;
        }

        .hero p {
            font-family: 'IBM Plex Mono', monospace;
            font-size: clamp(12px, 1.2vw, 14px);
            opacity: 0.6;
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Form */
        .apply-form {
            padding: 20px 0 80px;
        }

        .form-group {
            margin-bottom: 30px;
        }

        .form-group label {
            display: block;
            font-family: 'IBM Plex Mono', monospace;
            font-size: clamp(10px, 1vw, 12px);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.6;
            margin-bottom: 10px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            background-color: transparent;
            border: 1px solid rgba(239, 236, 212, 0.3);
            border-radius: 8px;
            padding: 15px;
            font-family: 'Lora', serif;
            font-size: clamp(14px, 1.3vw, 16px);
            color: #FFFFFF;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #FFFFFF;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-group select {
            cursor: pointer;
        }

        .form-group select option {
            background-color: #1E1E1E;
            color: #FFFFFF;
        }

        .submit-btn {
            width: 100%;
            font-family: 'Lora', serif;
            font-size: clamp(14px, 1.3vw, 16px);
            font-style: italic;
            font-weight: 400;
            color: #1E1E1E;
            background-color: #FFFFFF;
            border: none;
            border-radius: 50px;
            padding: 18px 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background-color: #E43535;
            color: #FFFFFF;
        }

        /* Back link */
        .back-link {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
        }

        .back-link a {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: #FFFFFF;
            text-decoration: none;
            letter-spacing: 2px;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .back-link a:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

<!-- Header -->
<div id="header">
    <a href="index.html"><img id="logo" src="logo.png" alt="The Bridge"></a>
    <div class="header-right">
        <nav id="nav-menu">
            <a href="manifesto.html">Manifesto</a>
            <a href="meet-us.html">Meet us</a>
            <a href="faq.html">FAQ</a>
        </nav>
        <a id="apply-btn" href="apply.html">Apply</a>
        <div id="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</div>

<!-- Mobile menu overlay -->
<div id="mobile-menu">
    <a href="index.html">Home</a>
    <a href="manifesto.html">Manifesto</a>
    <a href="meet-us.html">Meet us</a>
    <a href="faq.html">FAQ</a>
    <a href="apply.html">Apply</a>
</div>

<div id="content">
    <!-- Hero -->
    <div class="hero">
        <h1>Apply</h1>
        <p>Ready to make the leap? Tell us about yourself and what you're building.</p>
    </div>

    <!-- Form -->
    <form class="apply-form">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Your name" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="your@email.com" required>
        </div>

        <div class="form-group">
            <label>LinkedIn</label>
            <input type="url" placeholder="linkedin.com/in/yourprofile">
        </div>

        <div class="form-group">
            <label>Where are you based?</label>
            <input type="text" placeholder="City, Country">
        </div>

        <div class="form-group">
            <label>Stage</label>
            <select>
                <option value="">Select your stage</option>
                <option value="idea">Just an idea</option>
                <option value="prototype">Building a prototype</option>
                <option value="launched">Launched, early users</option>
                <option value="revenue">Some revenue</option>
            </select>
        </div>

        <div class="form-group">
            <label>What are you building?</label>
            <textarea placeholder="Tell us about your idea or company..."></textarea>
        </div>

        <div class="form-group">
            <label>Why do you want to join The Bridge?</label>
            <textarea placeholder="What do you hope to get out of the program?"></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit Application</button>
    </form>
</div>

<div class="back-link">
    <a href="index.html">BACK TO HOME</a>
</div>

<script>
// Positionnement du header identique à index.html
function positionHeader() {
    var header = document.getElementById('header');
    var baseSize = Math.min(window.innerWidth, window.innerHeight);
    var dotSpacing = Math.max(8, baseSize * 0.01);
    var marginSide = baseSize * 0.035;
    var marginTop = Math.max(50, baseSize * 0.06);

    // Calculer dotZone comme dans index.html
    var cols = Math.ceil(window.innerWidth / dotSpacing) + 1;
    var rows = Math.ceil(window.innerHeight / dotSpacing) + 1;

    var firstDotX, lastDotX, firstDotY;
    for (var c = 0; c < cols; c++) {
        var px = c * dotSpacing + dotSpacing / 2;
        if (px >= marginSide && firstDotX === undefined) firstDotX = px;
        if (px <= window.innerWidth - marginSide) lastDotX = px;
    }
    for (var r = 0; r < rows; r++) {
        var py = r * dotSpacing + dotSpacing / 2;
        if (py >= marginTop && firstDotY === undefined) firstDotY = py;
    }

    var dotZoneX = firstDotX;
    var dotZoneY = firstDotY;
    var dotZoneWidth = lastDotX - firstDotX;

    var headerTopMargin = marginSide * 0.5;
    header.style.top = headerTopMargin + 'px';
    header.style.height = (dotZoneY - headerTopMargin - 10) + 'px';
    header.style.paddingLeft = dotZoneX + 'px';
    header.style.paddingRight = (window.innerWidth - dotZoneX - dotZoneWidth) + 'px';

    var logo = document.getElementById('logo');
    logo.style.height = Math.max(18, baseSize * 0.03) + 'px';
}

// Form submit
document.querySelector('.apply-form').addEventListener('submit', function(e) {
    e.preventDefault();
    alert('Thanks for applying! We\'ll be in touch soon.');
});

window.addEventListener('resize', positionHeader);
positionHeader();

// Mobile menu toggle
var menuToggle = document.getElementById('menu-toggle');
var mobileMenu = document.getElementById('mobile-menu');

menuToggle.addEventListener('click', function() {
    menuToggle.classList.toggle('open');
    mobileMenu.classList.toggle('open');
});
</script>

</body>
</html>
